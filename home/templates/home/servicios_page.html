{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="bg-white py-20">
  <div class="max-w-5xl mx-auto text-center px-4">
    <h1 class="text-5xl font-extrabold text-blue-700 leading-tight">
      {{ page.title }}
    </h1>
    <div class="mt-6 text-lg text-gray-700 max-w-3xl mx-auto">
      {{ page.descripcion|richtext }}
    </div>
  </div>
</section>

<section class="bg-gray-50 py-16">
  <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
    {% for servicio in page.servicios.all %}
      <div>
        <div class="text-4xl text-emerald-500 mb-4">{{ servicio.icono }}</div>
        <h3 class="text-xl font-semibold mb-2">{{ servicio.titulo }}</h3>
        <p class="text-gray-600">{{ servicio.descripcion|richtext }}</p>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
