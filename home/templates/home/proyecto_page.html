{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="bg-white py-20 max-w-4xl mx-auto px-4">
  <h1 class="text-5xl font-extrabold text-blue-700 leading-tight text-center">
    {{ page.title }}
  </h1>
  <div class="mt-6 text-lg text-gray-700">
    <p><strong>Cliente:</strong> {{ page.cliente }}</p>
    <p class="mt-4">{{ page.resumen|richtext }}</p>
    <p class="mt-4"><strong>Tecnologías:</strong> {{ page.tecnologias }}</p>
  </div>
</section>
{% endblock %}
